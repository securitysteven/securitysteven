name: Update Profile Metrics
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch GitHub stats
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = '${{ github.repository_owner }}';
            const { data: user } = await github.rest.users.getByUsername({ username });
            const { data: repos } = await github.rest.repos.listForUser({ username, per_page: 100 });
            const totalStars = repos.reduce((s, r) => s + r.stargazers_count, 0);
            const topRepos = repos.filter(r => !r.fork).sort((a,b)=>b.stargazers_count-a.stargazers_count).slice(0,3).map(r=>({ name: r.name, stars: r.stargazers_count }));
            const stats = {
              name: user.name || user.login,
              avatar: user.avatar_url,
              public_repos: user.public_repos,
              followers: user.followers,
              totalStars,
              topRepos
            };
            const fs = require('fs');
            fs.writeFileSync('stats.json', JSON.stringify(stats), 'utf8');

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate metrics SVG
        run: node src/index.js
        env:
          STATS_FILE: stats.json
