name: Update Profile Metrics
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run metrics generator
        uses: securitysteven/securitysteven@main
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          output-path: 'assets/metrics.svg'
          username: 'securitysteven'
      - name: Commit generated svg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.svg || true
          git commit -m "chore: update profile metrics" || echo "no changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
