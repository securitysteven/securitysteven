name: Update Profile Metrics
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install dependencies
        run: npm install

      - name: Generate metrics
        uses: ./.github/actions/metrics
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_OUTPUT_PATH: 'assets/metrics.svg'
          INPUT_USERNAME: ${{ github.repository_owner }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.svg
          git commit -m "chore: update profile metrics [skip ci]" || exit 0
          git push
